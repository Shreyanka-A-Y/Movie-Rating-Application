<div class="movie-card">
  <form [formGroup]="movieForm">

    <input type="text" formControlName="title" placeholder="Movie Title">

    <input type="text" formControlName="genre" placeholder="Genre">

    <textarea formControlName="description" placeholder="Movie Description"></textarea>

    <input type="number" formControlName="releaseYear" placeholder="Release Year">

    <input type="text" formControlName="posterUrl" placeholder="Poster URL">

  </form>

  <button (click)="addMovie()">
    Add Movie
  </button>
</div>
